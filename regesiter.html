<!DOCTYPE html>
<html lang="en" x-data="appData()" :class="{ 'dark': darkMode }" :dir="layoutDir">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Movement | EcoThread Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        primary: '#2D5A27',
                        secondary: '#F4F1EA' 
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-500 flex items-center justify-center min-h-screen p-4">

    <header class="absolute top-0 left-0 w-full p-6 flex justify-between items-center z-50">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white font-bold transition-transform group-hover:rotate-12 shadow-lg">E</div>
            <span class="text-xl font-black tracking-tighter group-hover:text-primary transition-colors hidden sm:block">ECO THREAD</span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleLayout()" class="p-2.5 rounded-xl bg-white dark:bg-zinc-800 border dark:border-zinc-700 shadow-sm text-[10px] font-black uppercase">
                <span x-text="layoutDir"></span>
            </button>
            <button @click="toggleDark()" class="p-2.5 rounded-xl bg-white dark:bg-zinc-800 border dark:border-zinc-700 shadow-sm transition-all">
                <i x-show="!darkMode" data-lucide="moon" class="w-4 h-4"></i>
                <i x-show="darkMode" data-lucide="sun" class="w-4 h-4 text-yellow-500"></i>
            </button>
        </div>
    </header>

    <main class="w-full max-w-xl bg-white dark:bg-zinc-900 rounded-[2.5rem] shadow-2xl shadow-zinc-200 dark:shadow-none border dark:border-zinc-800 p-8 md:p-12 transition-all"
          x-data="{ showPass: false }">
        
        <div class="space-y-8">
            <div class="text-center space-y-2">
                <h2 class="text-3xl md:text-4xl font-black tracking-tighter">Create Account</h2>
                <p class="text-zinc-500 dark:text-zinc-400 text-sm">Join 10k+ rebels wearing the change.</p>
            </div>
    <div class="grid grid-cols-3 gap-3">
    <a href="https://google.com" target="_blank" 
       class="flex justify-center items-center py-3 border dark:border-zinc-700 rounded-2xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-600 dark:text-zinc-400 group-hover:scale-110 transition-transform">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="21.17" y1="8" x2="12" y2="8"></line>
            <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
            <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
        </svg>
    </a>

    <a href="https://github.com" target="_blank" 
       class="flex justify-center items-center py-3 border dark:border-zinc-700 rounded-2xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-600 dark:text-zinc-400 group-hover:scale-110 transition-transform">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
            <path d="M9 18c-4.51 2-5-2-7-2"></path>
        </svg>
    </a>

    <a href="https://twitter.com" target="_blank" 
       class="flex justify-center items-center py-3 border dark:border-zinc-700 rounded-2xl hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400 group-hover:scale-110 transition-transform">
            <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path>
        </svg>
    </a>
</div>

            <div class="relative flex items-center">
                <div class="flex-grow border-t dark:border-zinc-800"></div>
                <span class="mx-4 text-[10px] font-black uppercase tracking-widest text-zinc-400 whitespace-nowrap">or sign up with email</span>
                <div class="flex-grow border-t dark:border-zinc-800"></div>
            </div>

            <form class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 ml-1">Full Name</label>
                        <input type="text" placeholder="Srinivas K A" class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-800/50 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-zinc-800 rounded-2xl outline-none transition-all text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 ml-1">Email</label>
                        <input type="email" placeholder="hello@eco.com" class="w-full px-5 py-4 bg-zinc-50 dark:bg-zinc-800/50 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-zinc-800 rounded-2xl outline-none transition-all text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 ml-1">Password</label>
                    <div class="relative group">
                        <input :type="showPass ? 'text' : 'password'" placeholder="Create a strong password" class="w-full pl-5 pr-12 py-4 bg-zinc-50 dark:bg-zinc-800/50 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-zinc-800 rounded-2xl outline-none transition-all text-sm">
                        <button type="button" @click="showPass = !showPass" class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-primary">
                            <i x-show="!showPass" data-lucide="eye" class="w-4 h-4"></i>
                            <i x-show="showPass" data-lucide="eye-off" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1 py-2">
                    <input type="checkbox" class="mt-1 w-4 h-4 rounded border-zinc-300 text-primary focus:ring-primary">
                    <p class="text-[11px] text-zinc-500 leading-tight">
                        I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms of Service</a> and 
                        <a href="#" class="text-primary font-bold hover:underline">Privacy Policy</a>.
                    </p>
                </div>

                <button class="w-full bg-primary text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-green-900/10 hover:opacity-90 active:scale-[0.98] transition-all mt-4">
                    Create Account
                </button>
            </form>

            <p class="text-center text-xs text-zinc-500">
                Already a member? <a href="login.html" class="font-black text-primary hover:underline">Sign In Instead</a>
            </p>
        </div>
    </main>

    <script>
        function appData() {
            return {
                darkMode: localStorage.getItem('dark-mode') === 'true',
                layoutDir: localStorage.getItem('layout-dir') || 'ltr',
                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('dark-mode', this.darkMode);
                    // Re-run lucide when icons are toggled via x-show
                    this.$nextTick(() => { lucide.createIcons(); });
                },
                toggleLayout() {
                    this.layoutDir = this.layoutDir === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('layout-dir', this.layoutDir);
                },
                init() {
                    // This fires when Alpine is ready
                    lucide.createIcons();
                }
            }
        }
    </script>
</body>
</html>
